<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 游騎兵站長後台 | 馬祖小站</title>
    <meta name="robots" content="noindex,nofollow" />
    <style>
      html,
      body,
      #root {
        min-height: 100%;
        margin: 0;
        background: #02050a;
        color: #e8fcff;
      }

      body {
        min-height: 100vh;
        background:
          radial-gradient(circle at 20% 18%, rgba(0, 217, 232, 0.13), transparent 28%),
          radial-gradient(circle at 80% 80%, rgba(249, 115, 22, 0.1), transparent 30%),
          linear-gradient(135deg, #02050a, #07111c 48%, #02050a);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .boot-fallback {
        min-height: 100vh;
        display: grid;
        place-items: center;
        color: rgba(232, 252, 255, 0.72);
      }

      .boot-fallback div {
        border: 1px solid rgba(0, 217, 232, 0.22);
        background: rgba(8, 22, 34, 0.78);
        border-radius: 18px;
        padding: 18px 22px;
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.34);
      }

      .boot-fallback strong {
        display: block;
        color: #00d9e8;
        font-size: 0.82rem;
        letter-spacing: 0.14em;
        margin-bottom: 7px;
      }

      .boot-fallback span {
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="boot-fallback">
        <div>
          <strong>MATSU STATION</strong>
          <span>AI 游騎兵本地後台啟動中...</span>
        </div>
      </main>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
